<p>工作虽然忙碌，除了工作之外也想学很多的东西，希望自己能养成写作的习惯吧，然后，学更多的东西，充实自己。</p>
<p>可能前阵子太忙了，感觉身体比以前差了许多，所以最近开始做一些运动，希望会有点用处。</p>
